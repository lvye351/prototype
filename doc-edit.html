  <script>
    (function () {
      var raw = sessionStorage.getItem('editDocPayload');
      if (!raw) {
        location.href = 'index.html';
        return;
      }
      var doc = {};
      try {
        doc = JSON.parse(raw);
      } catch (e) {
        location.href = 'index.html';
        return;
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      document.getElementById('metaRest').innerHTML =
        '<div class="meta-block"><span class="meta-label">标题</span><span class="meta-val" title="' + escapeHtml(doc.name) + '">' + escapeHtml(doc.name) + '</span></div>' +
        '<span class="meta-sep"></span>' +
        '<div class="meta-block"><span class="meta-label">一级类型</span><span class="meta-val">' + escapeHtml(doc.level1) + '</span></div>' +
        '<span class="meta-sep"></span>' +
        '<div class="meta-block"><span class="meta-label">二级类型</span><span class="meta-val">' + escapeHtml(doc.level2) + '</span></div>' +
        '<span class="meta-sep"></span>' +
        '<div class="meta-block"><span class="meta-label">模板名称</span><span class="meta-val">' + escapeHtml(doc.templateName) + '</span></div>';

      var shortTitle = (doc.name || '技术规范书').replace(/\.(docx|doc)$/i, '');
      var coverTitle = buildFormalCoverTitle(shortTitle);
      var coverOrg = guessCoverOrg(shortTitle, doc);
      var coverDateZh = editTimeToCnYearMonth(doc.editTime || doc.createTime);

      document.getElementById('editor').innerHTML =
        '<div class="doc-cover">' +
          '<div class="doc-cover-spacer"></div>' +
          '<h1 class="doc-cover-title">' + escapeHtml(coverTitle) + '</h1>' +
          '<div class="doc-cover-anchor"></div>' +
          '<div class="doc-cover-bottom">' +
            '<p class="doc-cover-org">' + escapeHtml(coverOrg) + '</p>' +
            '<p class="doc-cover-date">' + escapeHtml(coverDateZh) + '</p>' +
          '</div>' +
        '</div>';

      function digitsToCnYear(yStr) {
        var map = '〇一二三四五六七八九';
        return String(yStr).split('').map(function (c) {
          var n = +c;
          return map[n] != null ? map[n] : c;
        }).join('');
      }

      function editTimeToCnYearMonth(iso) {
        var m = String(iso || '').match(/(\d{4})-(\d{1,2})/);
        if (!m) {
          var d = new Date();
          return digitsToCnYear(String(d.getFullYear())) + '年' + ['一','二','三','四','五','六','七','八','九','十','十一','十二'][d.getMonth()] + '月';
        }
        var mo = ['一','二','三','四','五','六','七','八','九','十','十一','十二'][+m[2] - 1] || m[2];
        return digitsToCnYear(m[1]) + '年' + mo + '月';
      }

      function guessCoverOrg(title, d) {
        if (/电信|河南/.test(title) || /电信|河南/.test(d.level1 || '')) {
          return '中国电信河南分公司';
        }
        var pre = (title || '').split(/[\d_]|建设|技术|项目|采购|规范书|汇报|方案|v\d/i)[0];
        if (pre && pre.length >= 2 && pre.length <= 12) return pre.replace(/公司$/, '') + '河南分公司';
        return '中国电信河南分公司';
      }

      function buildFormalCoverTitle(base) {
        if (/中国电信|端到端|透明化/.test(base)) return base;
        if (/XX公司|示例/.test(base)) {
          return '中国电信河南公司2023年端到端透明化监控建设项目技术规范书';
        }
        return base;
      }

      function countChars() {
        var t = document.getElementById('editor').innerText || '';
        return t.replace(/\s/g, '').length;
      }

      function updateWc() {
        document.getElementById('wcDisplay').textContent = countChars();
      }

      document.getElementById('editor').addEventListener('input', updateWc);
      updateWc();

      document.querySelectorAll('.review-tab').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var i = btn.getAttribute('data-i');
          document.querySelectorAll('.review-tab').forEach(function (b) {
            b.classList.toggle('active', b.getAttribute('data-i') === i);
          });
          showToast('切换：' + btn.textContent.trim());
        });
      });

      window.showToast = function (msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        clearTimeout(window.__tt);
        window.__tt = setTimeout(function () { t.style.display = 'none'; }, 2000);
      };
    })();
  </script>
</body>
</html>
